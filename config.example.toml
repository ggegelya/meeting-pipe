# Copy to ~/.config/meeting-pipe/config.toml and edit.

[recording]
# Where raw WAVs land. Tilde is expanded at runtime.
output_dir = "~/Documents/Meetings/raw"
# Name as it appears in Audio MIDI Setup. Must be the Aggregate Device that
# combines BlackHole 2ch + your physical mic. NOT an index.
audio_device = "Aggregate Device"
sample_rate = 16000
# Bundle IDs that auto-start recording without a prompt, e.g. ["us.zoom.xos"].
auto_consent_apps = []
# When true (and capture_mode = "blackhole"), the daemon transparently builds
# a transient Multi-Output Device combining BlackHole with whatever your
# default output is at the moment of recording (built-in speakers, AirPods,
# Focal Bathys, etc.) and switches system output to it for the duration of
# the meeting. The original output is restored when recording stops. Set to
# false if you already manage Multi-Output Devices yourself (e.g. via Loopback).
# Has no effect when capture_mode is "process_tap" or "none".
auto_route_output = true

# How to capture remote-side audio:
#   "auto"        → process_tap on macOS 14.2+, blackhole otherwise (default)
#   "process_tap" → Apple's CATap API (no BlackHole, requires Screen Recording perm)
#   "blackhole"   → legacy: ffmpeg from a manually-built Aggregate Device + Multi-Output
#   "none"        → mic only; you only see your half of the conversation
capture_mode = "auto"

[detection]
debounce_start_sec = 5
debounce_end_sec = 10
manual_hotkey = "ctrl+option+m"
prompt_timeout_sec = 30

[transcription]
# faster-whisper model identifier.
model = "large-v3"
# int8 = CPU. float16 = MPS (experimental — leave as int8 unless validated).
compute_type = "int8"
# "auto", "uk", "en", etc. (ISO 639-1).
language = "auto"
min_speakers = 1
max_speakers = 8
# If true, all segments are labeled "Speaker" (skip pyannote diarization).
disable_diarization = false

[summarization]
# Latest Sonnet at time of writing. Bump deliberately.
model = "claude-sonnet-4-6"
max_tokens = 4000
team_context = "FDA 21 CFR Part 11 regulated SaaS, .NET 8 + Angular + AWS EKS"

[notion]
# Notion database ID (32 chars, no hyphens — copy from the database URL).
database_id = ""
default_status = "Captured"
# Toggle off for regulated meetings to keep transcripts out of Notion.
include_full_transcript = true

[modes]
# When true, pipeline writes local Markdown only and skips Notion entirely.
regulated_mode = false
