# Copy to ~/.config/meeting-pipe/config.toml and edit.

[recording]
# Where raw WAVs land. Tilde is expanded at runtime.
output_dir = "~/Documents/Meetings/raw"
# Sample rate of the produced WAV. 16 kHz is what Whisper consumes;
# bumping higher just wastes disk + transcription time.
sample_rate = 16000
# Bundle IDs that auto-start recording without a prompt, e.g. ["us.zoom.xos"].
auto_consent_apps = []

# No microphone or output-device fields here — the daemon captures system
# audio via ScreenCaptureKit (regardless of which output device you use)
# and the user's voice via the macOS default input. Change the input in
# System Settings ▸ Sound ▸ Input and the next recording follows.

[detection]
debounce_start_sec = 5
# Window-closed signal (Signal C) lets us shrink this from 10s — Zoom and
# Teams keep the input device opened for a few seconds after a hangup, but
# the call window disappears immediately. 5s is enough margin to absorb
# a stuttery probe without trimming the tail of speech.
debounce_end_sec = 5
manual_hotkey = "ctrl+option+m"
# Stop-only hotkey (TECH-C5). Unlike `manual_hotkey`, pressing this
# when idle is a no-op — only stops a running recording. Useful as a
# panic button that can never accidentally start a fresh recording.
force_stop_hotkey = "ctrl+option+shift+m"
prompt_timeout_sec = 30

# Per-bundle overrides for `debounce_end_sec`. Lookup precedence:
# explicit entry → built-in browser default (12 s, because tab/window
# state flickers more during a call) → the global `debounce_end_sec`
# above. Keys are bundle IDs; values are seconds.
# [detection.debounce_end_per_bundle]
# "us.zoom.xos" = 7
# "com.google.Chrome" = 15

[transcription]
# MLX-converted Whisper repo on HuggingFace. Default is the turbo variant
# (best speed/quality tradeoff on Apple Silicon). Alternates:
#   mlx-community/whisper-large-v3-mlx   (slightly slower, slightly more accurate)
#   mlx-community/whisper-medium         (faster, mid-quality)
# On non-Apple-Silicon hosts the pipeline auto-falls-back to faster-whisper.
model = "mlx-community/whisper-large-v3-turbo"
# Used by the faster-whisper fallback (Linux, Intel macOS).
fallback_model = "large-v3"
# ISO 639-1 code (e.g. "en", "uk", "ru", "de"). English by default; flip
# to "auto" only if you actually need per-meeting detection. Whisper's
# auto-detect runs on the first 30 s of audio and misfires on accented
# speech and silence-heavy openings (Standup with Indian-English accents
# came back as Spanish in the wild). Forcing a language is more reliable
# when most of your meetings are in one language; the multilingual ASR
# still handles non-native accents fine once language is locked.
language = "en"
min_speakers = 1
max_speakers = 8
# True → all segments labeled "Speaker" (skip diarization entirely).
disable_diarization = false
# Diarization safety guard. sherpa-onnx runs at ~0.05-0.3× realtime so
# the historical 60-min cap is overconservative. 0 disables.
max_diarization_minutes = 240
# Offline diarize FastClustering threshold (cosine distance). Raise to
# merge more aggressively (fewer speakers); lower for more granular.
diarize_cluster_threshold = 0.85
# Streaming (online) diarize threshold. Different algorithm than the
# offline knob, different scale. Used by the `mp transcribe-stream`
# sidecar that runs during recording.
stream_diarize_threshold = 0.7

[summarization]
# Latest Sonnet at time of writing. Bump deliberately.
model = "claude-sonnet-4-6"
max_tokens = 4000
team_context = "FDA 21 CFR Part 11 regulated SaaS, .NET 8 + Angular + AWS EKS"
# Output language. "auto" (default) mirrors the transcript's detected
# language (Russian transcript → Russian summary). Force a specific
# ISO 639-1 code to override (e.g. "en" for English-only).
summary_language = "auto"
# Long-meeting guard: when the transcript markdown is longer than this many
# characters (~roughly 80 000 ≈ 20 000 tokens ≈ 1 hour of speech), the
# pipeline SKIPS automatic summarization + Notion publishing to avoid
# burning Anthropic tokens on long meetings. The transcript is left on disk
# along with a `.READY_FOR_MANUAL.md` file containing the exact prompt the
# pipeline would have sent — paste both into Claude Code and process the
# meeting locally without paying API costs. Set to 0 to disable the guard.
skip_above_chars = 80000
# Backend selection (P2.3). One of:
#   "anthropic" : current behaviour, requires ANTHROPIC_API_KEY in secrets.
#   "local"     : on-device MLX (Qwen 14B-4bit by default). No outbound
#                 API calls; audio/transcript/summary stay on this Mac.
#                 First use downloads the model (~9 GB) into HF cache.
#   "auto"      : try anthropic first, fall back to local on
#                 network/auth failure.
# Pair "local" with modes.regulated_mode = true for full zero-egress.
backend = "anthropic"
# Default local model is Qwen 3B-4bit (~2 GB on disk, ~10s/meeting on
# M-series). Switch to Qwen 14B-4bit (~8 GB, slower, better quality) or
# Qwen 32B-4bit (~18 GB, slowest, best quality) via Preferences ->
# Pipeline. The daemon pre-fetches the configured model when you flip
# backend to "local"/"auto" so the first meeting does not wait for HF.
local_model = "mlx-community/Qwen2.5-3B-Instruct-4bit"
local_endpoint = "http://127.0.0.1:8765"

[notion]
# Notion database ID (32 chars, no hyphens — copy from the database URL).
database_id = ""
default_status = "Captured"
# Toggle off for regulated meetings to keep transcripts out of Notion.
include_full_transcript = true

[modes]
# When true, pipeline writes local Markdown only and skips Notion entirely.
regulated_mode = false
