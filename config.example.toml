# Copy to ~/.config/meeting-pipe/config.toml and edit.

[recording]
# Where raw WAVs land. Tilde is expanded at runtime.
#
# There is no sample-rate knob: capture is a deliberate 16 kHz constant (what
# Parakeet TDT consumes). The key existed until HYG2 and nothing read it.
output_dir = "~/Documents/Meetings/raw"
# Bundle IDs that auto-start recording without a prompt, e.g. ["us.zoom.xos"].
auto_consent_apps = []
# When true, AVAudioEngine's voice-processing chain runs on the mic
# capture: noise suppression (same ML model as macOS Voice Isolation),
# echo cancellation, and AGC. Filters keyboard / typing / fan / room
# noise out of the recorded mic.wav.
#
# DEFAULT OFF. The macOS Voice Processing IO unit (kAudioUnitSubType_
# VoiceProcessingIO) drags the HAL device's gain DOWN system-wide
# while the engine is running, so other apps sharing the same mic
# (Teams, Zoom, FaceTime) hear the user as extremely quiet for the
# duration of the recording. Only flip true when meeting-pipe is the
# sole consumer of the mic (e.g. a solo voice memo, NOT a recorded
# call). The recorder reverts the VP unit on stop, but the live
# degradation while recording is unavoidable.
voice_processing = false
# When true, the daemon TRACKS your in-app mute in the active meeting
# client (Teams / Zoom / Slack / Webex), detected via Accessibility on the
# attributed meeting window. It does NOT pause or zero the mic: by default
# the mic is recorded in full (capture-first, ADR 0016). Tracking only
# records a muted-span timeline that a per-workflow "redact muted spans"
# opt-in uses to remove those moments from the notes offline, and feeds the
# idle auto-stop backstop. Only a regulated / NDA workflow silences the mic
# in real time. Best-effort: if AX is denied or the mute control isn't
# recognised, mute simply isn't tracked. Flip to false to skip mute
# tracking entirely (e.g. archival use cases).
honor_app_mute = true

# No microphone or output-device fields here — the daemon captures system
# audio via ScreenCaptureKit (regardless of which output device you use)
# and the user's voice via the macOS default input. Change the input in
# System Settings ▸ Sound ▸ Input and the next recording follows.

[detection]
# Seconds the detector waits after a meeting's signals go away before ending
# the recording. Window-closed signal (Signal C) lets us shrink this from 10s —
# Zoom and Teams keep the input device opened for a few seconds after a hangup,
# but the call window disappears immediately. 5s is enough margin to absorb
# a stuttery probe without trimming the tail of speech.
#
# There is no start-side twin: detection promotes on the first live signal so
# the prompt appears promptly, and the recorder arming is the real start gate.
# `debounce_start_sec` existed until HYG2 and nothing read it.
debounce_end_sec = 5
manual_hotkey = "ctrl+option+m"
# Stop-only hotkey (TECH-C5). Unlike `manual_hotkey`, pressing this
# when idle is a no-op — only stops a running recording. Useful as a
# panic button that can never accidentally start a fresh recording.
force_stop_hotkey = "ctrl+option+shift+m"
# Flag-moment hotkey (FEAT8). While recording, stamps a timestamp marker
# for an important moment (a quiet HUD blink); a no-op when idle. Markers
# surface in the summary and as clickable chips in the transcript.
flag_moment_hotkey = "ctrl+option+f"
# Off-the-record hotkey (MIC14). While recording, toggles a span kept out of
# the transcript, summary, and every published artifact (redacted before any
# consumer; the full recording stays local for recovery); under a regulated /
# NDA workflow the mic is zero-filled live instead. The HUD shows a persistent
# "Off the record" state while on; an open span auto-closes at stop. No-op when idle.
off_the_record_hotkey = "ctrl+option+o"
prompt_timeout_sec = 30
# What happens when you ignore the prompt for `prompt_timeout_sec`.
#   "skip"   : (default) suppress the call. The menu bar shows
#              "Suppressed (<app>)" while the meeting is still detected, and a
#              "Skipped <app>" notification offers a Start recording action that
#              begins the recording late, bypassing the cooldown.
#   "record" : auto-start an auto-summary recording.
#   "byo"    : auto-start a BYO (manual-paste) recording, no Anthropic call.
# Also a segmented control in Preferences -> Prompt.
default_prompt_action = "skip"
# After a recording for a bundle ends (or its prompt is skipped /
# timed out), suppress detector-driven prompts for the same bundle for
# this many seconds. Catches the post-call "Teams chat surface
# reclaims the mic" case where a fresh prompt would otherwise pop up
# 2-3 seconds after a stop flush. The manual hotkey always bypasses
# the cooldown. Set to 0 to disable.
reprompt_cooldown_sec = 60
# Auto-stop after this many seconds of VAD-silent mic while the
# system-audio side is also silent (TECH-END3 idle backstop). Catches
# the case where the user joins a meeting, every other participant
# drops, and the user forgets to stop. Gated on voice activity, so
# ambient room noise no longer resets the timer. Default 900 (15 minutes).
mic_only_silence_seconds = 900

[transcription]
# ASR language for the on-device FluidAudio (Parakeet TDT) runner. "auto" (the
# default) lets the SDK detect the language per meeting; an ISO 639-1 code pins
# it and skips detection, which is the safer setting if your meetings are always
# in one language. Recognised codes: en, uk, ru, de, es, fr, it, pt, pl. An
# unknown code falls back to auto-detect rather than failing. Also editable as
# Preferences -> Pipeline -> Languages -> Transcription; a change applies on the
# next daemon launch (the value is read once at startup).
#
# This is the ASR input language. `summarization.summary_language` below is the
# separate output-language knob for the generated summary.
language = "auto"
# Diarization clustering threshold for the on-device FluidAudio diarizer, in
# FluidAudio's valid 0.5-0.9 range (values outside are clamped on load). Lower
# groups fewer voice embeddings together, so it produces MORE distinct speakers;
# higher merges more of them into one. The default 0.65 sits below FluidAudio's
# own 0.7 on purpose: this app reads the attendees and the action / decision
# owners off the speaker labels, so merging several people into one voice puts a
# confidently wrong name on the summary, while the opposite failure only shows
# one person as two unnamed THEM-* clusters you can merge in the Library. Tune it
# against meetings you have hand-labelled with `scripts/valid1_check.py --der`
# (its "MERGED CLUSTERS" line flags a regression); a change takes effect on the
# next recording, no rebuild needed.
diarization_clustering_threshold = 0.65

[summarization]
# Latest Sonnet at time of writing. Bump deliberately.
model = "claude-sonnet-4-6"
max_tokens = 4000
team_context = "FDA 21 CFR Part 11 regulated SaaS, .NET 8 + Angular + AWS EKS"
# Your name, stamped on your own diarized speaker so "me vs them" reads as a
# real name instead of "Speaker 1". Which speaker is you: the mic channel on a
# stereo recording, else a voice profile learned automatically from your stereo
# recordings (holds on mono / merged calls). Both measure your own voice, so a
# meeting you stayed silent through names nobody: the speakers stay unknown for
# you to name in the app, rather than your name landing on whoever talked most.
# Blank keeps generic labels. Also editable as "Your name" in Preferences ->
# Pipeline.
user_label = ""
# Output language. "auto" (default) mirrors the transcript's detected
# language (Russian transcript → Russian summary). A fixed ISO 639-1 code
# (e.g. "en" or "uk") is the safer setting: it removes the ambiguity that
# lets a model localize a section into a language the transcript never
# contained, and it is honored across every generated section on both the
# cloud and local backends (LANG1). Prefer it if your meetings are always in
# one language.
summary_language = "auto"
# Long-meeting guard: when the transcript markdown is longer than this many
# characters (~roughly 80 000 ≈ 20 000 tokens ≈ 1 hour of speech), the
# pipeline SKIPS automatic summarization + Notion publishing to avoid
# burning Anthropic tokens on long meetings. The transcript is left on disk
# along with a `.READY_FOR_MANUAL.md` file containing the exact prompt the
# pipeline would have sent — paste both into Claude Code and process the
# meeting locally without paying API costs. Set to 0 to disable the guard.
skip_above_chars = 80000
# Backend selection (P2.3). One of:
#   "anthropic" : current behaviour, requires ANTHROPIC_API_KEY in the Keychain
#                 (set it in Preferences -> Integrations or via install.sh).
#   "local"     : on-device MLX (Qwen 7B-4bit by default). No outbound
#                 API calls; audio/transcript/summary stay on this Mac.
#                 First use downloads the model (~4.3 GB) into HF cache.
#   "auto"      : try anthropic first, fall back to local on
#                 network/auth failure.
#   "claude_cli": spawn the headless `claude -p` CLI (PROV1). No API key; uses
#                 your Claude Code login, so it summarizes at no marginal cost.
#                 A cloud backend: forced local under regulated/NDA.
#   "openai"    : an OpenAI-compatible API (PROV1), key OPENAI_API_KEY in the
#                 Keychain, model id in `openai_model` below. Cloud backend.
# Pair "local" with modes.regulated_mode = true for full zero-egress.
backend = "anthropic"
# Default local model is Qwen 7B-4bit (~4.3 GB on disk, ~30-90s/meeting on
# M-series): the engine-comparison sweet spot (LOCAL6), memory-safe and on
# par with the 14B on capture. Switch to Small (Qwen 3B-4bit, ~2 GB, faster,
# lower quality) or Large (Qwen 14B-4bit, ~8 GB, slower, best quality; wants
# 24 GB+ RAM) via Preferences -> Pipeline, or paste any HuggingFace MLX repo
# id. The daemon pre-fetches the configured model when you flip backend to
# "local"/"auto" so the first meeting does not wait for HF.
local_model = "mlx-community/Qwen2.5-7B-Instruct-4bit"
local_endpoint = "http://127.0.0.1:8765"
# Opt-in path to a locally-trained LoRA adapter (LOCAL9). Empty (the default)
# serves the base model. Train one with `mp train-adapter` on your corrections
# corpus, A/B it with `mp dogfood --adapter <dir>`, and set this only if it wins.
# Fully on-device, so a regulated/NDA run can use it too.
# local_adapter_path = ""
# Model id for the "openai" backend (PROV1). Ignored by every other backend.
openai_model = "gpt-4o"
# Local-backend timeouts (LOCAL2). `local_startup_timeout_sec` bounds the wait
# for mlx_lm.server to report healthy; `local_request_timeout_sec` is the base
# per-request read timeout, scaled up by `max_tokens` at call time so a long
# generation is not cut off mid-stream. The daemon's 20-min watchdog stays the
# hard backstop, so raising these only avoids premature cutoffs on slow models.
local_startup_timeout_sec = 120
local_request_timeout_sec = 120
# LLM diarization cleanup (TECH-DIAR1). When true, run-all runs an extra
# LLM pass after transcription that merges same-speaker labels and
# reattributes obvious mistakes before summarizing. Off by default: it
# adds one LLM round-trip per multi-speaker meeting. Honours `backend`
# above and stays on-device under regulated_mode. Run on demand any time
# with `mp cleanup-diarization <stem>.json`.
diarize_cleanup = false

[output]
# Ordered list of publishers to invoke after a summary is produced. Each sink
# fails independently, so one going down does not block the others. Add any of
# "obsidian", "filesystem", "lan" to fan out; each has its own section below and
# is only consulted when it appears here.
sinks = ["notion"]

[notion]
# Notion database ID (32 chars, no hyphens — copy from the database URL).
database_id = ""
default_status = "Captured"
# Toggle off for regulated meetings to keep transcripts out of Notion.
include_full_transcript = true

# Every key below is only read when its sink is listed in `output.sinks` above.
# The values shown are the defaults, so a sink you never enable costs nothing.

[obsidian]
# Required when "obsidian" is in output.sinks: the vault root. Left blank the
# sink cannot run, and `mp doctor` warns. Notes land at
# <vault_path>/<folder>/<date> <slug>.md with YAML front-matter.
# vault_path = "~/Documents/Obsidian/Personal"
folder = "Meetings"
# Point at your own Markdown template; blank uses the built-in one, which
# covers the common case.
template_path = ""
# Copy the recording into the vault beside the note.
attach_audio = true
attachments_subfolder = "_attachments"
# Also append a link to that day's daily note.
daily_note_backlink = false

[filesystem]
# Where the "filesystem" sink drops its three files per meeting (summary,
# transcript, actions). A sibling of the recordings dir by default.
output_dir = "~/Documents/Meetings/published"

[lan]
# Target directory on an ALREADY-MOUNTED SMB/NFS share for the "lan" sink.
# Same three files as the filesystem sink, but written atomically and only
# after a reachability check: the publisher never creates the mount root
# itself, so a share that is down fails loudly instead of quietly writing to
# local disk. On-prem, so it survives regulated mode.
mount_path = "/Volumes/meetings"
# Optional label, used only in the "share unreachable" error message.
host = ""

[modes]
# When true, pipeline writes local Markdown only and skips Notion entirely.
regulated_mode = false
