[project]
name = "meeting-pipe"
version = "0.1.0"
description = "Local meeting transcription + summarization + Notion publishing pipeline"
requires-python = ">=3.11,<3.13"
readme = "../README.md"
license = { text = "MIT" }
authors = [{ name = "meeting-pipe contributors" }]

dependencies = [
    "anthropic>=0.40.0",
    "httpx>=0.27.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.4.0",
    "tomli>=2.0.1; python_version < '3.11'",
    # ASR. mlx-whisper is the Apple-Silicon-native MLX/Metal backend; it
    # outperforms faster-whisper-on-CPU by ~5-10× on M-series and supports
    # all 99 Whisper languages with word-level timestamps. faster-whisper
    # stays in the dep list as a graceful fallback for non-Apple-Silicon
    # environments (CI, Linux).
    "mlx-whisper>=0.4.2; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "faster-whisper>=1.0.3",
    "soundfile>=0.12.1",
    "numpy>=1.26",
    # Diarization. sherpa-onnx runs offline speaker diarization on CoreML
    # (Apple Neural Engine) — language-agnostic, no torch/pyannote pin
    # pain, ~5-10× faster than pyannote-CPU. ONNX Runtime is bundled.
    # Pin under 1.13 — 1.13.0 ships a Python wheel whose .so references
    # libonnxruntime.1.24.4.dylib but the wheel doesn't bundle that dylib,
    # so import fails at load time. 1.12.x bundles correctly via the
    # sister `sherpa-onnx-core` package.
    "sherpa-onnx>=1.10.30,<1.13",
    # Explicit because 1.12.x split the C++ dylibs into a separate
    # package. sherpa-onnx itself doesn't pin this with == in its
    # METADATA, so `uv sync` has been observed to drop it across
    # subsequent re-syncs, leaving sherpa_onnx importable but failing
    # at first use with "Library not loaded: libonnxruntime.1.24.4.dylib".
    "sherpa-onnx-core>=1.10.30,<1.13",
    # Notion + auth + retries.
    "tenacity>=8.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-vcr>=1.0.2",
    "vcrpy>=6.0.1",
    "ruff>=0.5.0",
]

[project.scripts]
mp = "mp.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mp"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
