[project]
name = "meeting-pipe"
version = "0.1.0"
description = "Local meeting transcription + summarization + Notion publishing pipeline"
requires-python = ">=3.11,<3.13"
readme = "../README.md"
license = { text = "MIT" }
authors = [{ name = "meeting-pipe contributors" }]

dependencies = [
    "anthropic>=0.40.0",
    "httpx>=0.27.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.4.0",
    "tomli>=2.0.1; python_version < '3.11'",
    # Transcription stack. WhisperX wraps faster-whisper + pyannote.
    # Pinned ranges to stay reproducible; bump deliberately.
    "faster-whisper>=1.0.3",
    "whisperx>=3.1.1",
    "torch>=2.2.0,<2.5.0",
    "torchaudio>=2.2.0,<2.5.0",
    # pyannote.audio is imported directly by transcribe.py (PyannoteDiarizer
    # calls Pipeline.from_pretrained), so declare it explicitly even though
    # whisperx pulls it transitively. Same story for pandas — used by
    # annotation_to_whisperx_df. matplotlib is needed because pyannote's
    # segmentation task mixins import it unconditionally and don't declare it.
    "pyannote.audio>=3.3.0",
    "pandas>=2.0",
    "matplotlib>=3.7",
    # Notion + auth + retries.
    "tenacity>=8.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-vcr>=1.0.2",
    "vcrpy>=6.0.1",
    "ruff>=0.5.0",
]

[project.scripts]
mp = "mp.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mp"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
