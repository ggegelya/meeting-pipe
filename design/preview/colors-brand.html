<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--mp-bg); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .swatch { border-radius: var(--mp-radius-md); overflow:hidden; border:1px solid var(--mp-border); }
  .chip { height:64px; }
  .meta { padding:8px 10px; background:var(--mp-bg-raised); display:flex; justify-content:space-between; align-items:baseline; }
  .name { font-size:var(--mp-text-sm); font-weight:var(--mp-weight-semibold); }
  .hex  { font-family:var(--mp-font-mono); font-size:var(--mp-text-xs); color:var(--mp-fg-subtle); }
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#F5F6F8"></div><div class="meta"><span class="name">Porcelain</span><span class="hex">#F5F6F8</span></div></div>
    <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><span class="name">Porcelain raised</span><span class="hex">#FFFFFF</span></div></div>
    <div class="swatch"><div class="chip" style="background:#ECEEF1"></div><div class="meta"><span class="name">Porcelain sunk</span><span class="hex">#ECEEF1</span></div></div>
    <div class="swatch"><div class="chip" style="background:#16181C"></div><div class="meta"><span class="name" style="color:#fff;background:#16181C;margin:-8px -10px;padding:8px 10px">Ink 900</span><span class="hex" style="color:#838B95;background:#16181C;margin:-8px -10px;padding:8px 10px">#16181C</span></div></div>
    <div class="swatch"><div class="chip" style="background:#0E9488"></div><div class="meta"><span class="name">Signal 600</span><span class="hex">#0E9488</span></div></div>
    <div class="swatch"><div class="chip" style="background:#0C7F74"></div><div class="meta"><span class="name">Signal fill</span><span class="hex">#0C7F74</span></div></div>
    <div class="swatch"><div class="chip" style="background:#0FBFAC"></div><div class="meta"><span class="name">On-air LED</span><span class="hex">#0FBFAC</span></div></div>
    <div class="swatch"><div class="chip" style="background:#E5484D"></div><div class="meta"><span class="name">Pulse 600</span><span class="hex">#E5484D</span></div></div>
    <div class="swatch"><div class="chip" style="background:#1F8F4E"></div><div class="meta"><span class="name">Success</span><span class="hex">#1F8F4E</span></div></div>
    <div class="swatch"><div class="chip" style="background:#B27300"></div><div class="meta"><span class="name">Warning</span><span class="hex">#B27300</span></div></div>
  </div>
</body></html>
