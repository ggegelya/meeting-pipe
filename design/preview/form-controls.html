<!doctype html>
<html><head><meta charset="utf-8"><title>Form controls</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--mp-bg); display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:10px; align-items:center; font-size:var(--mp-text-base); }
  label { color: var(--mp-fg-muted); width: 120px; text-align: right; }
  input[type=text], select {
    font: inherit; font-size:var(--mp-text-base);
    height: 24px; padding: 0 8px;
    border-radius: var(--mp-radius-sm); border: 1px solid var(--mp-border-strong);
    background: var(--mp-bg-raised); color: var(--mp-fg);
    min-width: 220px;
  }
  input[type=text]:focus, select:focus { outline: none; border-color: var(--mp-signal-600); box-shadow: var(--mp-focus-ring); }
  /* Mechanical toggle (DSN24): fixed ink-300 off-track, teal on, a short snap (not a soft slide). */
  .toggle { position: relative; width:34px; height:20px; background:var(--mp-ink-300); border-radius:999px; transition: background 90ms var(--mp-ease-out); flex-shrink:0; }
  .toggle.on { background: var(--mp-signal-600); }
  .toggle::after { content:""; position:absolute; top:2px; left:2px; width:16px; height:16px; background:#fff; border-radius:50%; transition: transform 90ms var(--mp-ease-out); box-shadow:0 1px 2px rgba(0,0,0,0.2); }
  .toggle.on::after { transform: translateX(14px); }
  .check { width:14px; height:14px; border-radius:var(--mp-radius-xs); border:1px solid var(--mp-border-strong); display:inline-flex; align-items:center; justify-content:center; }
  .check.on { background: var(--mp-signal-600); border-color: var(--mp-signal-600); color:#fff; }
</style></head>
<body>
  <div class="row"><label>Output dir</label><input type="text" value="~/Documents/Meetings/raw" style="font-family:var(--mp-font-mono);font-size:12px"></div>
  <div class="row"><label>Sample rate</label><select><option>16 kHz (recommended)</option><option>24 kHz</option><option>48 kHz</option></select></div>
  <div class="row"><label>Regulated mode</label><span class="toggle"></span><span class="mp-secondary">Off</span></div>
  <div class="row"><label>Auto-record Zoom</label><span class="toggle on"></span><span class="mp-secondary">On</span></div>
  <div class="row"><label>Disable diarization</label><span class="check on"><svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="mp-secondary">Useful for Ukrainian / Russian</span></div>
</body></html>
