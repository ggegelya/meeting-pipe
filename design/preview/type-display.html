<!doctype html>
<html><head><meta charset="utf-8"><title>Type — display</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--mp-bg); }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; align-items:baseline; gap:14px; }
  .meta { font-family:var(--mp-font-mono); font-size:11px; color:var(--mp-fg-subtle); white-space:nowrap; min-width:88px; }
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="meta">56 / 600</div><div class="mp-display">Local meetings.</div></div>
    <div class="row"><div class="meta">40 / 600</div><div class="mp-h1">Quietly captured.</div></div>
    <div class="row"><div class="meta">28 / 600</div><div class="mp-h2">Sent to Notion.</div></div>
    <div class="row"><div class="meta">22 / 600</div><div class="mp-h3">Meeting detected — Zoom</div></div>
  </div>
</body></html>
