<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--mp-bg); }
  .row { display:flex; gap:14px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box { width:64px; height:64px; background:var(--mp-bg-raised); border:1px solid var(--mp-border-strong); }
  .name { font-family:var(--mp-font-mono); font-size:11px; color:var(--mp-fg-subtle); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--mp-radius-xs)"></div><span class="name">xs · 4</span></div>
    <div class="item"><div class="box" style="border-radius:var(--mp-radius-sm)"></div><span class="name">sm · 8</span></div>
    <div class="item"><div class="box" style="border-radius:var(--mp-radius-md)"></div><span class="name">md · 14</span></div>
    <div class="item"><div class="box" style="border-radius:var(--mp-radius-lg)"></div><span class="name">lg · 18</span></div>
    <div class="item"><div class="box" style="border-radius:var(--mp-radius-xl)"></div><span class="name">xl · 22</span></div>
    <div class="item"><div class="box" style="border-radius:var(--mp-radius-full)"></div><span class="name">full · capsule</span></div>
  </div>
</body></html>
