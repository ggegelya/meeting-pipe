<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--mp-bg); }
  .row { display:flex; gap:14px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box { width:64px; height:64px; background:var(--mp-bg-raised); border:1px solid var(--mp-border-strong); }
  .name { font-family:var(--mp-font-mono); font-size:11px; color:var(--mp-fg-subtle); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><span class="name">xs · 4</span></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><span class="name">sm · 6</span></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><span class="name">md · 10</span></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><span class="name">lg · 14</span></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><span class="name">xl · 20</span></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><span class="name">full</span></div>
  </div>
</body></html>
