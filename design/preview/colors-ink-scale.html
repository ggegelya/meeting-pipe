<!doctype html>
<html><head><meta charset="utf-8"><title>Ink scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--mp-bg); }
  .row { display:flex; gap:0; border-radius:var(--mp-radius-md); overflow:hidden; border:1px solid var(--mp-border); }
  .step { flex:1; padding:14px 10px 12px; display:flex; flex-direction:column; gap:4px; }
  .name { font-size:var(--mp-text-xs); font-weight:var(--mp-weight-semibold); letter-spacing:var(--mp-tracking-wide); }
  .hex  { font-family:var(--mp-font-mono); font-size:10px; opacity:0.7; }
  .h2 { font-size: var(--mp-text-sm); color:var(--mp-fg-muted); margin: 0 0 10px; font-weight:var(--mp-weight-semibold); letter-spacing:var(--mp-tracking-caps); text-transform:uppercase;}
</style></head>
<body>
  <div class="h2">Ink - foreground scale</div>
  <div class="row">
    <div class="step" style="background:#F5F6F8;color:#16181C"><span class="name">50</span><span class="hex">#F5F6F8</span></div>
    <div class="step" style="background:#ECEEF1;color:#16181C"><span class="name">100</span><span class="hex">#ECEEF1</span></div>
    <div class="step" style="background:#D9DDE2;color:#16181C"><span class="name">200</span><span class="hex">#D9DDE2</span></div>
    <div class="step" style="background:#B9BFC7;color:#16181C"><span class="name">300</span><span class="hex">#B9BFC7</span></div>
    <div class="step" style="background:#838B95;color:#fff"><span class="name">400</span><span class="hex">#838B95</span></div>
    <div class="step" style="background:#646C77;color:#fff"><span class="name">500</span><span class="hex">#646C77</span></div>
    <div class="step" style="background:#566068;color:#fff"><span class="name">600</span><span class="hex">#566068</span></div>
    <div class="step" style="background:#2D323A;color:#fff"><span class="name">700</span><span class="hex">#2D323A</span></div>
    <div class="step" style="background:#202329;color:#fff"><span class="name">800</span><span class="hex">#202329</span></div>
    <div class="step" style="background:#16181C;color:#fff"><span class="name">900</span><span class="hex">#16181C</span></div>
  </div>
</body></html>
