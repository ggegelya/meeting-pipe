<!doctype html>
<html><head><meta charset="utf-8"><title>Ink scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--mp-bg); }
  .row { display:flex; gap:0; border-radius:var(--mp-radius-md); overflow:hidden; border:1px solid var(--mp-border); }
  .step { flex:1; padding:14px 10px 12px; display:flex; flex-direction:column; gap:4px; }
  .name { font-size:var(--mp-text-xs); font-weight:var(--mp-weight-semibold); letter-spacing:var(--mp-tracking-wide); }
  .hex  { font-family:var(--mp-font-mono); font-size:10px; opacity:0.7; }
  .h2 { font-size: var(--mp-text-sm); color:var(--mp-fg-muted); margin: 0 0 10px; font-weight:var(--mp-weight-semibold); letter-spacing:var(--mp-tracking-caps); text-transform:uppercase;}
</style></head>
<body>
  <div class="h2">Ink — foreground scale</div>
  <div class="row">
    <div class="step" style="background:#F5F6F8;color:#14161A"><span class="name">50</span><span class="hex">#F5F6F8</span></div>
    <div class="step" style="background:#ECEEF2;color:#14161A"><span class="name">100</span><span class="hex">#ECEEF2</span></div>
    <div class="step" style="background:#D8DCE2;color:#14161A"><span class="name">200</span><span class="hex">#D8DCE2</span></div>
    <div class="step" style="background:#B7BDC6;color:#14161A"><span class="name">300</span><span class="hex">#B7BDC6</span></div>
    <div class="step" style="background:#9098A4;color:#fff"><span class="name">400</span><span class="hex">#9098A4</span></div>
    <div class="step" style="background:#6E747F;color:#fff"><span class="name">500</span><span class="hex">#6E747F</span></div>
    <div class="step" style="background:#4A4F58;color:#fff"><span class="name">600</span><span class="hex">#4A4F58</span></div>
    <div class="step" style="background:#2C3037;color:#fff"><span class="name">700</span><span class="hex">#2C3037</span></div>
    <div class="step" style="background:#1F2227;color:#fff"><span class="name">800</span><span class="hex">#1F2227</span></div>
    <div class="step" style="background:#14161A;color:#fff"><span class="name">900</span><span class="hex">#14161A</span></div>
  </div>
</body></html>
