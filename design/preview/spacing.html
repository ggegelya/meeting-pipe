<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--mp-bg); }
  .stack { display:flex; flex-direction:column; gap:6px; }
  .row { display:flex; align-items:center; gap:12px; }
  .name { font-family:var(--mp-font-mono); font-size:11px; color:var(--mp-fg-subtle); width:80px; }
  .bar { background:var(--mp-signal-600); height:10px; border-radius:2px; }
  .px { font-family:var(--mp-font-mono); font-size:11px; color:var(--mp-fg-muted); }
</style></head>
<body>
  <div class="stack">
    <div class="row"><span class="name">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
    <div class="row"><span class="name">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
    <div class="row"><span class="name">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
    <div class="row"><span class="name">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
    <div class="row"><span class="name">--space-5</span><div class="bar" style="width:20px"></div><span class="px">20</span></div>
    <div class="row"><span class="name">--space-6</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
    <div class="row"><span class="name">--space-8</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
    <div class="row"><span class="name">--space-10</span><div class="bar" style="width:40px"></div><span class="px">40</span></div>
    <div class="row"><span class="name">--space-12</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
    <div class="row"><span class="name">--space-16</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
  </div>
</body></html>
