<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Meeting Pipe — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  body { margin:0; padding:32px; background: #E8E6DF; min-height: 100vh; }
  .stage { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 24px; max-width: 1200px; margin: 0 auto; }
  .frame { background: var(--mp-bg-raised); border: 1px solid var(--mp-border); border-radius: 12px; padding: 18px; }
  .frame h3 { margin: 0 0 12px; font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--mp-fg-subtle); }
  .menubar { background: rgba(248,247,244,0.85); backdrop-filter: blur(20px); border: 0.5px solid rgba(20,22,26,0.10); border-radius: 6px; height: 22px; display: inline-flex; align-items: center; padding: 0 8px; gap: 6px; font-size: 12px; color: #14161A; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .menubar img { filter: none; }
  .desk { background: linear-gradient(180deg, #2C3037 0%, #14161A 100%); border-radius: 12px; padding: 16px; min-height: 240px; display: flex; gap: 12px; align-items: flex-start; justify-content: space-between; }
  .span2 { grid-column: span 2; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="MeetingPrompt.jsx"></script>
<script type="text/babel" src="MenuBarDropdown.jsx"></script>
<script type="text/babel" src="Notification.jsx"></script>
<script type="text/babel" src="PreferencesWindow.jsx"></script>
<script type="text/babel" src="SummaryLibrary.jsx"></script>
<script type="text/babel" src="OnboardingPermissions.jsx"></script>

<script type="text/babel">
const App = () => (
  <div className="stage">
    <div className="frame span2">
      <h3>Desktop · menu-bar + detection prompt + notification</h3>
      <div className="desk" style={{ flexDirection: "column", alignItems: "stretch", gap: 16 }}>
        <div style={{ display: "flex", gap: 16, alignItems: "flex-start", justifyContent: "space-between" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <span className="menubar"><img src="../../assets/menubar-icon.svg" width="14" height="14" style={{filter: "brightness(0)"}}/> Idle</span>
            <span className="menubar"><img src="../../assets/menubar-icon-recording.svg" width="14" height="14"/> Recording</span>
            <span className="menubar"><img src="../../assets/menubar-icon.svg" width="14" height="14" style={{filter: "brightness(0)"}}/> Detected Zoom</span>
          </div>
          <Notification kind="done"/>
        </div>
        <div style={{ display: "flex", justifyContent: "center" }}>
          <MeetingPrompt source={{ displayName: "Zoom" }}/>
        </div>
      </div>
    </div>

    <div className="frame">
      <h3>Menu-bar dropdown · idle</h3>
      <MenuBarDropdown state="idle"/>
    </div>
    <div className="frame">
      <h3>Menu-bar dropdown · recording</h3>
      <MenuBarDropdown state="recording" file="20260430-1430.wav"/>
    </div>

    <div className="frame">
      <h3>Notification · started</h3>
      <Notification kind="started"/>
    </div>
    <div className="frame">
      <h3>Notification · processing</h3>
      <Notification kind="processing"/>
    </div>

    <div className="frame span2">
      <h3>Preferences window</h3>
      <PreferencesWindow/>
    </div>

    <div className="frame span2">
      <h3>Library window</h3>
      <SummaryLibrary/>
    </div>

    <div className="frame span2">
      <h3>Onboarding · permissions (proposed)</h3>
      <OnboardingPermissions/>
    </div>
  </div>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
