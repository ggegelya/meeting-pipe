name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: Pipeline (pytest)
    # Pure-Python tests — runs everywhere. The transcribe step's heavy deps
    # (whisperx + torch) are imported lazily inside the function body, so the
    # tests can exercise the renderer + everything else without installing
    # them. We deliberately bypass `uv run` and `uv sync` to avoid pulling
    # the full project dependency tree (and the multi-minute torch wheel
    # download) on every CI run.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11

      - name: Install dev deps + editable package (no project deps)
        run: |
          uv venv --python 3.11
          uv pip install \
            "anthropic>=0.40.0" \
            "httpx>=0.27.0" \
            "pydantic>=2.7.0" \
            "tenacity>=8.2.0" \
            "pandas>=2.0" \
            "pytest>=8.0.0" \
            "ruff>=0.5.0"
          uv pip install -e . --no-deps

      - name: Lint
        # Use the venv binary directly — `uv run` would trigger `uv sync`
        # and pull in whisperx + torch, which we don't need for tests.
        run: .venv/bin/ruff check src tests

      - name: Test
        # All tests run together. test_transcribe.py only touches
        # render_markdown, which sits at module top and doesn't trigger
        # the lazy `import whisperx` inside transcribe().
        run: .venv/bin/pytest -v

  daemon:
    name: Daemon (swift build + test)
    runs-on: macos-14
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        # Pure-logic tests: HotkeyManager.parse, ConsentStore round-trip,
        # Config TOML parsing, AppState equality, ffmpeg lookup, secrets
        # re-source. Integration tests that need TCC permissions
        # (NSWorkspace observers, AVCaptureDevice KVO) still require a real
        # desktop session and aren't run in CI.
        run: swift test
