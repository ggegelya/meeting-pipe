name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  conventions:
    name: Conventions (em-dash lint)
    # The em-dash rule from CONVENTIONS.md ("Use hyphens, commas, or
    # rewrite"). Diff-based on purpose: historical content predates the
    # rule and isn't worth a mass-rewrite. We only fail on em-dashes
    # introduced in this PR / push so a backslide is caught at the gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for em-dashes in added lines
        env:
          BEFORE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -e
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No base SHA (first push / shallow clone) - skipping diff check."
            exit 0
          fi
          # `git diff --unified=0` plus added-line filter (`^+` but not
          # `^+++`) gives just the lines this PR introduces.
          added=$(git diff --unified=0 "$BEFORE"...HEAD -- \
            ':!**/Package.resolved' \
            ':!**/uv.lock' \
            ':!CONVENTIONS.md' \
            ':!.github/workflows/ci.yml' \
            | grep -E '^\+' | grep -v '^\+\+\+' || true)
          if echo "$added" | grep -P '—' >/dev/null; then
            echo "::error::CONVENTIONS.md em-dash rule violated in this change. Use hyphen, comma, or rewrite."
            echo "$added" | grep -nP '—'
            exit 1
          fi
          echo "No newly-introduced em-dashes."
      - name: No em-dashes in daemon UI sources (TECH-UI-2)
        shell: bash
        run: |
          # Whole-file (not diff) guard: the Swift sources and bundled
          # resources that surface UI strings must stay free of U+2014
          # entirely, so a backslide is caught even on an untouched line.
          set -e
          matches=$(git grep -l $'—' -- daemon/Sources daemon/Resources || true)
          if [ -n "$matches" ]; then
            echo "::error::TECH-UI-2: U+2014 (em-dash) found under daemon/Sources or daemon/Resources. Use a hyphen, comma, or rewrite."
            git grep -n $'—' -- daemon/Sources daemon/Resources || true
            exit 1
          fi
          echo "No em-dashes under daemon/Sources or daemon/Resources."

  pipeline:
    name: Pipeline (pytest)
    # Pure-Python tests, run on Linux. ASR and diarization are Swift
    # (FluidAudio); the pipeline only summarizes and publishes. The local
    # summary backend's heavy dep (mlx-lm) is imported lazily and is
    # darwin/arm64-only, so Linux CI exercises the renderers, publishers,
    # and orchestrator without it. We deliberately bypass `uv run` / `uv
    # sync` and install a pinned light dependency set so CI does not
    # resolve the full project tree on every run.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11

      - name: Install dev deps + editable package (no project deps)
        run: |
          uv venv --python 3.11
          uv pip install \
            "anthropic>=0.40.0" \
            "httpx>=0.27.0" \
            "pydantic>=2.7.0" \
            "tenacity>=8.2.0" \
            "numpy>=1.26" \
            "soundfile>=0.12.1" \
            "pytest>=8.0.0" \
            "ruff>=0.5.0"
          uv pip install -e . --no-deps

      - name: Lint
        # Use the venv binary directly: `uv run` would trigger `uv sync`
        # and resolve the full project tree, including mlx-lm.
        run: .venv/bin/ruff check src tests

      - name: Test
        # All tests run against the pinned light dependency set. The
        # mlx-lm import in summarize_local.py is lazy, and its tests stub
        # the server, so CI never needs the heavy local-model dep.
        run: .venv/bin/pytest -v

  daemon:
    name: Daemon (swift build + test)
    # macos-15: its default Xcode ships a Swift 6 toolchain, required to
    # resolve the FluidAudio package (its Package.swift declares
    # swift-tools-version 6.0). The macos-14 image's default Xcode is
    # older and fails dependency resolution before the build even starts.
    runs-on: macos-15
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        # Pure-logic tests: HotkeyManager.parse, ConsentStore round-trip,
        # Config TOML parsing, AppState equality, ffmpeg lookup, secrets
        # re-source. Integration tests that need TCC permissions
        # (NSWorkspace observers, AVCaptureDevice KVO) still require a real
        # desktop session and aren't run in CI.
        run: swift test
