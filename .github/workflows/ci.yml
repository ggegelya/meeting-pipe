name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  conventions:
    name: Conventions (em-dash lint)
    # The em-dash rule from CONVENTIONS.md ("Use hyphens, commas, or
    # rewrite"). Diff-based on purpose: historical content predates the
    # rule and isn't worth a mass-rewrite. We only fail on em-dashes
    # introduced in this PR / push so a backslide is caught at the gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for em-dashes in added lines
        env:
          BEFORE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -e
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No base SHA (first push / shallow clone) - skipping diff check."
            exit 0
          fi
          # `git diff --unified=0` plus added-line filter (`^+` but not
          # `^+++`) gives just the lines this PR introduces.
          added=$(git diff --unified=0 "$BEFORE"...HEAD -- \
            ':!**/Package.resolved' \
            ':!**/uv.lock' \
            ':!CONVENTIONS.md' \
            ':!.github/workflows/ci.yml' \
            | grep -E '^\+' | grep -v '^\+\+\+' || true)
          if echo "$added" | grep -P '—' >/dev/null; then
            echo "::error::CONVENTIONS.md em-dash rule violated in this change. Use hyphen, comma, or rewrite."
            echo "$added" | grep -nP '—'
            exit 1
          fi
          echo "No newly-introduced em-dashes."
      - name: No em-dashes in daemon UI sources (TECH-UI-2)
        shell: bash
        run: |
          # Whole-file (not diff) guard: the Swift sources and bundled
          # resources that surface UI strings must stay free of U+2014
          # entirely, so a backslide is caught even on an untouched line.
          set -e
          matches=$(git grep -l $'—' -- daemon/Sources daemon/Resources || true)
          if [ -n "$matches" ]; then
            echo "::error::TECH-UI-2: U+2014 (em-dash) found under daemon/Sources or daemon/Resources. Use a hyphen, comma, or rewrite."
            git grep -n $'—' -- daemon/Sources daemon/Resources || true
            exit 1
          fi
          echo "No em-dashes under daemon/Sources or daemon/Resources."

  design-tokens:
    name: Design tokens (TECH-DSN3)
    # Enforce the MPColors / MPType design tokens. Colors are a whole-file
    # guard (they were all migrated); fonts are diff-based, since the existing
    # `.system(size:)` literals predate the token ramp and a mass-rewrite would
    # risk sub-pixel shifts and lose Dynamic Type, so we only block new ones.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: No raw semantic color literals in daemon UI sources
        shell: bash
        run: |
          # Whole-file guard: the semantic state colors must come from the
          # tokens (.mpDanger / .mpWarning / .mpSuccess / .mpSignal), not the
          # generic system .red/.orange/.green/.accentColor. Tokens.swift is the
          # single allowed source (it defines them plus the speaker palette).
          set -e
          matches=$(git grep -nE 'Color\.(red|orange|green|accentColor)|\.foregroundStyle\(\.(red|orange|green)\)|\.foregroundColor\(\.(red|orange|green)\)|\.accentColor|tint: \.(red|orange|green)\b|return \.(red|orange|green)\b' -- 'daemon/Sources/*.swift' ':!daemon/Sources/MeetingPipe/Design/Tokens.swift' || true)
          if [ -n "$matches" ]; then
            echo "::error::TECH-DSN3: raw semantic color literal under daemon/Sources. Use the token (.mpDanger / .mpWarning / .mpSuccess / .mpSignal)."
            echo "$matches"
            exit 1
          fi
          echo "No raw semantic color literals."
      - name: No bare native-semantic text colors (TECH-DSN18)
        shell: bash
        run: |
          # DSN18: native .secondary/.tertiary/.quaternary fail WCAG as text on
          # paper (.tertiary ~1.88:1, .secondary ~3.94:1). Text foregrounds must
          # come from the legibility-checked tokens (fgMuted / fgSubtle), whose
          # floor ContrastFloorTests pins. Recursive scope on purpose (the color
          # and font guards above use a shallow daemon/Sources/*.swift glob that
          # never reached subdirectories); Design/ is the allowed definition site.
          # Color.secondary.opacity(...) fills and borders are out of scope (not
          # text), matching the spec.
          set -e
          matches=$(git grep -nE '\.foregroundStyle\(\.(secondary|tertiary|quaternary)\)|\.foregroundColor\(\.(secondary|tertiary|quaternary)\)|return \.(secondary|tertiary|quaternary)\b' -- daemon/Sources ':!daemon/Sources/MeetingPipe/Design' || true)
          if [ -n "$matches" ]; then
            echo "::error::TECH-DSN18: bare native-semantic text color under daemon/Sources. Use a token (Color(MPColors.fgMuted) for secondary, Color(MPColors.fgSubtle) for tertiary)."
            echo "$matches"
            exit 1
          fi
          echo "No bare native-semantic text colors."
      - name: No newly-introduced raw font-size literals
        env:
          BEFORE: ${{ github.event.pull_request.base.sha || github.event.before }}
        shell: bash
        run: |
          # Diff-based: only fail on a NEW `.system(size:)` a change adds. Prefer
          # MPType.textXX for the size, or a Dynamic-Type font (.caption,
          # .headline) where scaling matters.
          set -e
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No base SHA (first push / shallow clone) - skipping diff check."
            exit 0
          fi
          added=$(git diff --unified=0 "$BEFORE"...HEAD -- 'daemon/Sources/*.swift' ':!daemon/Sources/MeetingPipe/Design/Tokens.swift' \
            | grep -E '^\+' | grep -v '^\+\+\+' || true)
          if echo "$added" | grep -F '.system(size:' >/dev/null; then
            echo "::error::TECH-DSN3: new raw .system(size:) font literal. Use MPType.textXX for the size, or a Dynamic-Type font where scaling matters."
            echo "$added" | grep -nF '.system(size:'
            exit 1
          fi
          echo "No newly-introduced raw font-size literals."

  pipeline:
    name: Pipeline (pytest)
    # Pure-Python tests, run on Linux. ASR and diarization are Swift
    # (FluidAudio); the pipeline only summarizes and publishes. The local
    # summary backend's heavy dep (mlx-lm) is imported lazily and is
    # darwin/arm64-only, so Linux CI exercises the renderers, publishers,
    # and orchestrator without it. We deliberately bypass `uv run` / `uv
    # sync` and install a pinned light dependency set so CI does not
    # resolve the full project tree on every run.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11

      - name: Install dev deps + editable package (no project deps)
        run: |
          uv venv --python 3.11
          uv pip install \
            "anthropic>=0.40.0" \
            "httpx>=0.27.0" \
            "pydantic>=2.7.0" \
            "tenacity>=8.2.0" \
            "numpy>=1.26" \
            "soundfile>=0.12.1" \
            "pytest>=8.0.0" \
            "ruff>=0.5.0" \
            "pyright>=1.1.400"
          uv pip install -e . --no-deps

      - name: Lint
        # Use the venv binary directly: `uv run` would trigger `uv sync`
        # and resolve the full project tree, including mlx-lm.
        run: .venv/bin/ruff check src tests

      - name: Typecheck
        # TYPE1: pyright basic over src/. Resolves imports against .venv via
        # `[tool.pyright] venvPath`, so the light dep set above is what it sees;
        # the three darwin-only imports absent here (mlx_embeddings, mlx.core,
        # huggingface_hub) are suppressed at their lazy import sites.
        run: .venv/bin/pyright

      - name: Test
        # All tests run against the pinned light dependency set. The
        # mlx-lm import in summarize_local.py is lazy, and its tests stub
        # the server, so CI never needs the heavy local-model dep.
        run: .venv/bin/pytest -v

  daemon:
    name: Daemon (swift build + test)
    # macos-15: its default Xcode ships a Swift 6 toolchain, required to
    # resolve the FluidAudio package (its Package.swift declares
    # swift-tools-version 6.0). The macos-14 image's default Xcode is
    # older and fails dependency resolution before the build even starts.
    runs-on: macos-15
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Install ffmpeg
        # The MuteRedactor data-safety tests shell out to ffmpeg to verify the
        # mute-redaction path over a real WAV (the most destructive code path).
        # GitHub's macOS image ships no ffmpeg, so without this the tests would
        # silently skip and the path would go unverified. It lands in
        # /opt/homebrew/bin, which MeetingRecorder.findFFmpeg() resolves via PATH.
        run: |
          brew install ffmpeg
          ffmpeg -version | head -1
      - name: Build
        run: swift build
      - name: Test
        # Pure-logic tests: HotkeyManager.parse, ConsentStore round-trip,
        # Config TOML parsing, AppState equality, ffmpeg lookup, secrets
        # re-source. Integration tests that need TCC permissions
        # (NSWorkspace observers, AVCaptureDevice KVO) still require a real
        # desktop session and aren't run in CI.
        run: swift test
