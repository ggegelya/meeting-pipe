# MicGate localised mute-button label catalogue (TECH-G-MIC).
#
# Schema: [<app>.<locale>] tables with four optional arrays of
# strings. Matching is case-insensitive substring against the
# button's AX title / help / description blob.
#
# action_unmute  -> label visible when the user is currently muted
#                   (clicking the button would unmute)
# action_mute    -> label visible when the user is currently unmuted
# status_muted   -> explicit status string for "muted" (most specific)
# status_unmuted -> explicit status string for "unmuted"
#
# Coverage: Teams, Zoom, Slack, Webex in en, de, es, fr, ja, pt, ru
# (the seven locales named in the TECH-G-MIC spec). Best-effort labels
# from public documentation and live AX scrapes; MuteLabelsValidator
# runs in CI against installed apps in each locale and flags drift for
# TOML updates.

# ===== Teams =====

[teams.en]
action_unmute = ["Unmute"]
action_mute = ["Mute"]
status_muted = ["Mic muted", "Microphone muted", "Microphone is muted"]
status_unmuted = ["Mic unmuted", "Microphone unmuted", "Microphone is unmuted"]

[teams.de]
action_unmute = ["Stummschaltung aufheben"]
action_mute = ["Stummschalten"]
status_muted = ["Mikrofon stummgeschaltet"]
status_unmuted = ["Mikrofon aktiviert"]

[teams.es]
action_unmute = ["Activar micrófono"]
action_mute = ["Silenciar micrófono"]

[teams.fr]
action_unmute = ["Activer le micro", "Réactiver le micro"]
action_mute = ["Couper le micro"]

[teams.ja]
action_unmute = ["ミュート解除"]
action_mute = ["ミュート"]

[teams.pt]
action_unmute = ["Ativar microfone"]
action_mute = ["Silenciar microfone"]

[teams.ru]
action_unmute = ["Включить микрофон"]
action_mute = ["Выключить микрофон"]

